<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tabela de preços </title>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="itens">
                <h1>CADASTRO</h1>
                <div class="products-name">
                    <p>Nome do produto</p>
                    <form>
                    <input type="text" required placeholder="Nome do produto">
                    </form>
                </div>
                <div class="cost-price">
                    <p>Preço de custo</p>
                    <form>
                    <input name="number" required placeholder="Preço de custo"/>
                    </form>
                </div>
                <div class="sale-price">
                    <p>Preço de venda</p>
                    <form>
                    <input name="number" required placeholder="Preço de venda"/>
                    </form>
                </div>
                <div>
                    <button type="submit">Cadastrar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
