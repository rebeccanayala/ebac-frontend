<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tabela de preços </title>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="items" id="form-validation">
                <h1>CADASTRO</h1>
                <div class="products-name">
                    <p>Nome do produto</p>
                    <form>
                        <input type="text" required placeholder="Produto">
                </div>

                <div class="cost-price" id="cost-price">
                    <p>Preço de custo</p>
                    <input type="number" min="0.00" max="10000.00" step="0.01" required placeholder="Custo"/>
                </div>

                <div class="sale-price" id="sale-price">
                    <p>Preço de venda</p>
                    <input type="number" min="0.00" max="10000.00" step="0.01" required placeholder="Venda"/>
                        <div>
                            <button type="submit">Cadastrar</button>
                        </div>
                    </form>
                </div>
                <p class="error-message">
                    Atenção! O preço de venda precisa ser maior que o preço de custo.
                <p class="success-message"></p>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
